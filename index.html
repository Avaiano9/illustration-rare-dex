<!DOCTYPE html>
<html lang="pt-BR"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Illustration Rare Dex</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0f14;--bg2:#12151c;--panel:#161a23;--panel2:#1c212c;--line:#252b38;--line2:#2e3646;
--ink:#eef1f6;--ink2:#aab3c4;--ink3:#6b7488;--gold:#e7b84b;--gold-soft:#e7b84b33;--gold-line:#e7b84b66;
--mono:"Space Mono",ui-monospace,monospace;--disp:"Space Grotesk",system-ui,sans-serif;
--r-Kanto:#e05a5a;--r-Johto:#e0b24a;--r-Hoenn:#46b381;--r-Sinnoh:#5b8ce0;--r-Unova:#8a93a6;
--r-Kalos:#b06fd6;--r-Alola:#e89246;--r-Galar:#d05f92;--r-Paldea:#cf6238;--r-\u2014:#6b7488;}
*{box-sizing:border-box}html,body{margin:0}
body{background:radial-gradient(1200px 600px at 50% -10%,#171b24 0%,var(--bg) 60%);color:var(--ink);font-family:var(--disp);-webkit-font-smoothing:antialiased;min-height:100vh}
.wrap{max-width:1320px;margin:0 auto;padding:0 20px 40px}
header{position:sticky;top:0;z-index:40;background:linear-gradient(180deg,rgba(13,15,20,.97),rgba(13,15,20,.86));backdrop-filter:blur(10px);border-bottom:1px solid var(--line);margin-bottom:22px}
.hd{max-width:1320px;margin:0 auto;padding:16px 20px 14px;display:flex;flex-wrap:wrap;gap:18px 26px;align-items:center}
.brand{display:flex;flex-direction:column;gap:2px;min-width:210px}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--ink3)}
.title{font-size:23px;font-weight:700;letter-spacing:-.01em;line-height:1}.title b{color:var(--gold)}
.progwrap{flex:1;min-width:260px;display:flex;align-items:center;gap:16px}
.ring{--p:0;width:58px;height:58px;border-radius:50%;flex:none;background:conic-gradient(var(--gold) calc(var(--p)*1%),var(--line) 0);display:grid;place-items:center;transition:--p .5s ease}
.ring::after{content:"";width:44px;height:44px;border-radius:50%;background:var(--bg2);position:absolute}
.ring span{position:relative;font-family:var(--mono);font-size:13px;font-weight:700}
.pmeta{display:flex;flex-direction:column;gap:3px}.pbig{font-family:var(--mono);font-size:15px}.pbig b{color:var(--gold);font-size:19px}
.pbar{height:6px;width:min(340px,46vw);background:var(--line);border-radius:99px;overflow:hidden}
.pbar i{display:block;height:100%;width:0;background:linear-gradient(90deg,#c99a2e,var(--gold));border-radius:99px;transition:width .5s ease}
.tools{display:flex;gap:8px}
.tbtn{font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--ink2);background:var(--panel);border:1px solid var(--line2);padding:8px 11px;border-radius:9px;cursor:pointer;transition:.15s;white-space:nowrap}
.tbtn:hover{color:var(--ink);border-color:var(--gold-line)}
.tbtn:disabled{opacity:.55;cursor:default}

.tbtn.add{color:var(--gold);border-color:var(--gold-line);background:var(--panel)}
.tbtn.add:hover{color:#1a1608;background:var(--gold);border-color:var(--gold)}
.addsp{max-width:560px}
.aspsearch{padding:16px 22px 6px}
.aspsearch input{width:100%;font-family:var(--disp);font-size:15px;color:var(--ink);background:var(--panel);border:1px solid var(--line2);border-radius:11px;padding:12px 14px;outline:none;transition:.15s}
.aspsearch input:focus{border-color:var(--gold-line);box-shadow:0 0 0 3px var(--gold-soft)}
.asplist{display:flex;flex-direction:column;gap:6px;padding:8px 22px;max-height:52vh;overflow:auto}
.aspitem{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:var(--panel);color:var(--ink);font-family:var(--disp);font-size:14px;font-weight:600;cursor:pointer;transition:.14s;text-align:left}
.aspitem:hover{border-color:var(--gold);background:var(--panel2)}
.aspitem .dx{font-family:var(--mono);font-size:10.5px;font-weight:400;color:var(--ink3);white-space:nowrap}
.asphint{font-family:var(--mono);font-size:10.5px;color:var(--ink3);letter-spacing:.03em;padding:4px 22px 20px}
.rmrow{padding:6px 22px 20px}
.rmsp{font-family:var(--mono);font-size:11px;letter-spacing:.03em;color:var(--ink3);background:none;border:1px solid var(--line2);border-radius:8px;padding:8px 12px;cursor:pointer;transition:.15s}
.rmsp:hover{color:#e05a5a;border-color:#e05a5a66}
.aspsearch{display:flex;gap:8px;align-items:center}
.aspbk{font-family:var(--mono);font-size:11px;color:var(--ink2);background:var(--panel);border:1px solid var(--line2);border-radius:9px;padding:11px 12px;cursor:pointer;white-space:nowrap;transition:.15s}
.aspbk:hover{color:var(--gold);border-color:var(--gold-line)}
.libcard{display:flex;gap:12px;align-items:center;text-align:left;padding:10px;border:1px solid var(--line);border-radius:12px;background:var(--panel);cursor:pointer;transition:.14s;width:100%}
.libcard:hover{border-color:var(--gold);background:var(--panel2)}
.lib-ib{flex:0 0 72px;height:100px;border-radius:8px;overflow:hidden;background:var(--panel2);display:grid;place-items:center}
.lib-ib img{width:100%;height:100%;object-fit:contain}
.lib-meta{display:flex;flex-direction:column;gap:3px;min-width:0}
.lib-meta b{font-family:var(--disp);font-size:14px;color:var(--ink)}
.lib-meta i{font-style:normal;font-family:var(--mono);font-size:10.5px;color:var(--ink2)}
.lib-meta em{font-style:normal;font-family:var(--mono);font-size:10px;color:var(--gold);letter-spacing:.04em}
.libcard.marker .lib-ib{background:#0e1424}
.controls{display:flex;flex-wrap:wrap;gap:14px;align-items:center;margin-bottom:16px}
.search{position:relative;flex:1;min-width:230px}
.search input{width:100%;font-family:var(--disp);font-size:15px;color:var(--ink);background:var(--panel);border:1px solid var(--line2);border-radius:11px;padding:12px 14px 12px 40px;outline:none;transition:.15s}
.search input:focus{border-color:var(--gold-line);box-shadow:0 0 0 3px var(--gold-soft)}
.search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--ink3)}
.seg{display:flex;background:var(--panel);border:1px solid var(--line2);border-radius:11px;padding:3px;gap:2px}
.seg button{font-family:var(--mono);font-size:12px;letter-spacing:.03em;color:var(--ink2);background:none;border:0;padding:8px 14px;border-radius:8px;cursor:pointer;transition:.15s}
.seg button[aria-pressed=true]{background:var(--gold);color:#1a1608;font-weight:700}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:22px}
.chip{font-family:var(--mono);font-size:11.5px;letter-spacing:.02em;color:var(--ink2);background:var(--panel);border:1px solid var(--line2);padding:6px 11px;border-radius:99px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:.15s}
.chip:hover{color:var(--ink)}.chip .dot{width:8px;height:8px;border-radius:50%;background:var(--c,var(--ink3))}
.chip .cnt{font-size:10.5px;color:var(--ink3)}.chip[aria-pressed=true]{background:var(--panel2);border-color:var(--c,var(--gold));color:var(--ink)}
.chip[aria-pressed=true] .cnt{color:var(--ink2)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:14px}
.card{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;cursor:pointer;transition:transform .16s ease,border-color .16s ease,box-shadow .16s ease}
.card:hover{transform:translateY(-3px);border-color:var(--line2);box-shadow:0 10px 26px -12px #000a}
.card.owned{border-color:var(--gold-line);box-shadow:0 0 0 1px var(--gold-line),0 8px 24px -14px #e7b84b55}
.card.fresh{animation:pop .5s ease}
@keyframes pop{0%{transform:scale(.9);opacity:0}100%{transform:scale(1);opacity:1}}
.rbar{height:4px;background:var(--c,var(--ink3))}
.imgbox{position:relative;aspect-ratio:245/342;background:#0a0c11;display:grid;place-items:center;overflow:hidden}
.imgbox img{width:100%;height:100%;object-fit:contain;transition:filter .3s ease,opacity .3s ease}
.imgbox img.failed{display:none}
.card.miss .imgbox img{filter:grayscale(1) brightness(.62) contrast(.92);opacity:.62}
.card.miss:hover .imgbox img{filter:grayscale(.15) brightness(.9);opacity:.9}
.cback{width:100%;height:100%;display:grid;place-items:center;background:radial-gradient(circle at 50% 34%,#2c3a66 0%,#1a2340 58%,#0e1424 100%)}
.cback svg{width:52%;height:52%;filter:drop-shadow(0 2px 6px #0007)}
.card.miss .cback{filter:brightness(.72) saturate(.85)}
.card.miss:hover .cback{filter:brightness(.95)}
.noimg{font-family:var(--mono);font-size:10.5px;color:var(--ink3);text-align:center;padding:10px;line-height:1.4}
.multi{position:absolute;top:7px;right:7px;font-family:var(--mono);font-size:10px;font-weight:700;background:#0d0f14cc;color:var(--ink2);border:1px solid var(--line2);border-radius:7px;padding:3px 6px;backdrop-filter:blur(4px)}
.chk{position:absolute;top:7px;left:7px;width:26px;height:26px;border-radius:8px;display:grid;place-items:center;background:#0d0f14cc;border:1px solid var(--line2);backdrop-filter:blur(4px);transition:.15s;z-index:3}
.chk svg{width:15px;height:15px;stroke:var(--ink3);fill:none;stroke-width:2.4;transition:.15s}
.card.owned .chk{background:var(--gold);border-color:var(--gold)}.card.owned .chk svg{stroke:#1a1608}
.meta{padding:9px 10px 11px}.dexn{font-family:var(--mono);font-size:10px;color:var(--ink3);letter-spacing:.04em}
.name{font-size:14px;font-weight:600;letter-spacing:-.01em;line-height:1.15;margin-top:1px}
.empty{grid-column:1/-1;text-align:center;padding:70px 20px;color:var(--ink3);font-family:var(--mono);font-size:13px}
.foot{margin-top:34px;padding-top:18px;border-top:1px solid var(--line);color:var(--ink3);font-family:var(--mono);font-size:11px;line-height:1.7}
.foot b{color:var(--ink2);font-weight:400}
.ov{position:fixed;inset:0;z-index:60;background:#080a0ecc;backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:22px}
.ov.on{display:flex}
.modal{background:var(--bg2);border:1px solid var(--line2);border-radius:18px;max-width:660px;width:100%;max-height:88vh;overflow:auto;box-shadow:0 30px 80px -20px #000}
.mhd{padding:20px 22px 14px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg2);z-index:2}
.mhd .rowx{display:flex;justify-content:space-between;align-items:flex-start;gap:14px}.mhd .dexn{font-size:12px}
.mhd h2{margin:2px 0 0;font-size:24px;font-weight:700;letter-spacing:-.01em}
.mtag{font-family:var(--mono);font-size:11px;color:var(--ink2);border:1px solid var(--line2);border-radius:99px;padding:4px 10px;display:inline-flex;align-items:center;gap:6px;margin-top:8px}
.close{background:var(--panel);border:1px solid var(--line2);color:var(--ink2);width:34px;height:34px;border-radius:10px;font-size:17px;cursor:pointer;flex:none}
.close:hover{color:var(--ink);border-color:var(--gold-line)}
.msub{font-family:var(--mono);font-size:11px;color:var(--ink3);letter-spacing:.04em;padding:14px 22px 4px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;padding:8px 22px 6px}
.cc{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--panel);transition:.15s;position:relative}
.cc.have{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold-line)}
.cc .ib{aspect-ratio:245/342;background:#0a0c11;display:grid;place-items:center}
.cc .ib img{width:100%;height:100%;object-fit:contain}.cc .ib img.failed{display:none}
.cc .cm{padding:8px 9px 10px}.cc .cset{font-size:12.5px;font-weight:600;line-height:1.2}
.cc .cnum{font-family:var(--mono);font-size:10px;color:var(--ink3);margin-top:2px}
.cc .crar{display:inline-block;font-family:var(--mono);font-size:9px;letter-spacing:.03em;color:var(--ink2);border:1px solid var(--line2);border-radius:5px;padding:1px 5px;margin-top:5px}
.cc button.mk{width:100%;margin-top:8px;font-family:var(--mono);font-size:10.5px;letter-spacing:.03em;border:1px solid var(--line2);background:var(--panel2);color:var(--ink2);padding:7px;border-radius:8px;cursor:pointer;transition:.15s}
.cc button.mk:hover{color:var(--ink);border-color:var(--gold-line)}
.cc.have button.mk{background:var(--gold);color:#1a1608;font-weight:700;border-color:var(--gold)}
.cc.custom{border-style:dashed}
.cbadge{position:absolute;top:6px;right:6px;font-family:var(--mono);font-size:8.5px;letter-spacing:.04em;background:#0d0f14cc;color:var(--ink2);border:1px solid var(--line2);border-radius:6px;padding:2px 5px}
.cc .del{position:absolute;top:6px;left:6px;width:22px;height:22px;border-radius:6px;background:#0d0f14cc;border:1px solid var(--line2);color:var(--ink3);cursor:pointer;font-size:12px;line-height:1;display:grid;place-items:center}
.cc .del:hover{color:#e05a5a;border-color:#e05a5a66}
.addbox{margin:8px 22px 22px;border:1px dashed var(--line2);border-radius:12px;padding:14px}
.addbox h4{margin:0 0 3px;font-size:13px;font-weight:600}
.addbox p{margin:0 0 11px;font-family:var(--mono);font-size:10.5px;color:var(--ink3);line-height:1.5}
.addrow{display:flex;flex-wrap:wrap;gap:8px}
.addrow input{font-family:var(--disp);font-size:13px;color:var(--ink);background:var(--panel);border:1px solid var(--line2);border-radius:9px;padding:9px 11px;outline:none;transition:.15s}
.addrow input:focus{border-color:var(--gold-line);box-shadow:0 0 0 3px var(--gold-soft)}
.addrow .i-set{flex:2;min-width:150px}.addrow .i-num{flex:1;min-width:80px}
.filebtn{font-family:var(--mono);font-size:11px;letter-spacing:.03em;color:var(--ink2);background:var(--panel);border:1px solid var(--line2);border-radius:9px;padding:9px 12px;cursor:pointer;transition:.15s;white-space:nowrap}
.filebtn:hover{border-color:var(--gold-line);color:var(--ink)}
.filehint{font-family:var(--mono);font-size:10.5px;color:var(--gold);padding-top:7px;min-height:1em}
.stats{max-width:620px}
.statsbody{padding:6px 22px 24px;max-height:70vh;overflow:auto}
.bignums{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:10px 0 18px}
.bignum{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 14px;text-align:center}
.bignum b{display:block;font-size:24px;font-weight:700}
.bignum span{font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--ink3);text-transform:uppercase}
.sech{font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;color:var(--ink3);text-transform:uppercase;margin:16px 0 8px}
.rbarrow{display:flex;align-items:center;gap:10px;margin:7px 0}
.rbarrow .rlab{font-family:var(--disp);font-size:12.5px;font-weight:600;width:76px}
.rbarrow .rtrk{flex:1;height:10px;border-radius:6px;background:var(--panel);border:1px solid var(--line);overflow:hidden}
.rbarrow .rfill{height:100%;border-radius:6px;background:var(--c)}
.rbarrow .rnum{font-family:var(--mono);font-size:10.5px;color:var(--ink3);width:86px;text-align:right}
.pricebox{background:var(--panel);border:1px solid var(--gold-line);border-radius:12px;padding:14px;margin-top:6px}
.pricebox .prow{display:flex;justify-content:space-between;gap:10px;margin:6px 0;font-size:13.5px}
.pricebox .prow b{font-size:15px}
.pnote{font-family:var(--mono);font-size:10px;color:var(--ink3);line-height:1.6;margin-top:10px}
.addrow button{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.03em;background:var(--gold);color:#1a1608;border:0;border-radius:9px;padding:9px 16px;cursor:pointer}
.addrow button:hover{filter:brightness(1.05)}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;background:var(--panel2);border:1px solid var(--gold-line);color:var(--ink);font-family:var(--mono);font-size:12px;padding:10px 16px;border-radius:10px;z-index:80;transition:.25s;pointer-events:none;max-width:90vw;text-align:center}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
@media (max-width:560px){.grid{grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:11px}.title{font-size:20px}}
@media (prefers-reduced-motion:reduce){*{transition:none!important}.card.fresh{animation:none}}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
</style></head><body>
<header><div class="hd">
  <div class="brand"><span class="eyebrow">Alt Art · IR · SIR</span><span class="title">Illustration Rare <b>Dex</b></span></div>
  <div class="progwrap"><div class="ring" id="ring"><span id="ringpct">0%</span></div>
    <div class="pmeta"><div class="pbig"><b id="ownN">0</b> / <span id="totN">618</span> Pokémon</div><div class="pbar"><i id="pbar"></i></div></div></div>

  </div>
</div></header>
<div class="wrap">
  <div class="controls">
    <div class="search"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg><input id="q" placeholder="Buscar Pokémon, set ou carta…" autocomplete="off"></div>
    <div class="seg" role="group" aria-label="Status"><button data-st="all" aria-pressed="true">Todos</button><button data-st="have">Tenho</button><button data-st="need">Faltam</button></div>

</div></div>

</div></div>

<script>
let BASE=[],DEXMAP={},KNOWN_SETS=[],SET_TOTALS={},IMGMAP={},LIMMAP={},PRICES=null;const UPDATED="30/06/2026";
const RAW="https://raw.githubusercontent.com/PokemonTCG/pokemon-tcg-data/master/";
const REGIONS=["Kanto","Johto","Hoenn","Sinnoh","Unova","Kalos","Alola","Galar","Paldea"];
let DATA=[],TOTAL=0,owned={},custom={},extra=[],updatedSets=[],userSpecies=[];
let filterRegion=null,filterStatus="all",query="",freshDex=new Set();
const CBACK=`<div class="cback" title="Carta de arte rara (marcador)"><svg viewBox="0 0 100 100" aria-hidden="true"><circle cx="50" cy="50" r="40" fill="#e9edff" stroke="#0f1526" stroke-width="4"/><path d="M50 10a40 40 0 0 1 40 40H10a40 40 0 0 1 40-40z" fill="#c6d2ff"/><path d="M10 50h80" stroke="#0f1526" stroke-width="6"/><circle cx="50" cy="50" r="12" fill="#fff" stroke="#0f1526" stroke-width="5"/></svg></div>`;

/* ---- storage: window.storage (artefato) -> localStorage (offline) -> memória ---- */
const store={
  async get(k){ try{ if(window.storage&&window.storage.get) return await window.storage.get(k); }catch(e){}
    try{ const v=localStorage.getItem(k); return v==null?null:{value:v}; }catch(e){ return null; } },
  async set(k,v){ try{ if(window.storage&&window.storage.set){ await window.storage.set(k,v); return; } }catch(e){}
    try{ localStorage.setItem(k,v); }catch(e){} }
};
const parse=(r,d)=>{ try{ return JSON.parse((r&&r.value)||"")||d; }catch(e){ return d; } };
let sT;function save(){clearTimeout(sT);sT=setTimeout(async()=>{
  await store.set("owned_v1",JSON.stringify(owned));
  await store.set("custom_v1",JSON.stringify(custom));},250);}
async function saveUsp(){await store.set("usp_v1",JSON.stringify(userSpecies));}

/* ---- montar dataset de trabalho = BASE + atualizações incorporadas ---- */
const dedup=c=>((c.set||"").toLowerCase().replace(/[^a-z0-9]/g,""))+"|"+String(c.num||"").toUpperCase().replace(/[^A-Z0-9]/g,"");
function buildWorking(){
  const map=new Map();
  BASE.forEach(s=>map.set(s.dexn,{species:s.species,dex:s.dex,region:s.region,dexn:s.dexn,cards:s.cards.map(c=>({...c}))}));
  extra.forEach(e=>{
    let sp=map.get(e.dexn);
    if(!sp){sp={species:e.species,dex:e.dex,region:e.region,dexn:e.dexn,cards:[]};map.set(e.dexn,sp);}
    if(!sp.cards.some(c=>dedup(c)===dedup(e.card))) sp.cards.push(e.card);
  });
  userSpecies.forEach(u=>{
    if(map.has(u.dexn))return; // se já existe carta real desse Pokémon, ela prevalece
    map.set(u.dexn,{species:u.species,dex:u.dex||("#"+String(u.dexn).padStart(4,"0")),region:u.region,dexn:u.dexn,
      cards:[{name:u.species,set:"",num:"",img:"",rarity:"",placeholder:true}]});
  });
  DATA=[...map.values()].sort((a,b)=>a.dexn-b.dexn);
  DATA.forEach((s,i)=>s._i=i);
  TOTAL=DATA.length; totN.textContent=TOTAL;
}

const combined=s=>s.cards.concat(custom[s.species]||[]);
const isOwned=s=>Object.prototype.hasOwnProperty.call(owned,s.species);
const repCard=s=>{const L=combined(s);const idx=isOwned(s)?owned[s.species]:0;return L[idx]||L[0]||{};};
const repImg=s=>repCard(s).img;
const ownedCount=()=>Object.keys(owned).length;
const norm=t=>(t||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
function altUrls(s,n,cur){
  const out=[];const num0=String(n||"");
  const L=(s&&LIMMAP)?LIMMAP[s]:null;
  if(L){let num=/^\d+$/.test(num0)?num0.padStart(3,"0"):num0;
    out.push("https://limitlesstcg.nyc3.cdn.digitaloceanspaces.com/tpci/"+L+"/"+L+"_"+num+"_R_EN_SM.png");}
  const m=(s&&IMGMAP)?IMGMAP[s]:null;
  if(m){let num=num0;if(m.p&&/^\d+$/.test(num))num=num.padStart(3,"0");
    out.push("https://assets.tcgdex.net/en/"+m.t+"/"+num+"/high.webp");}
  if(PRICES&&PRICES.imgs){
    const k=((s||"").toLowerCase().replace(/[^a-z0-9]/g,""))+"|"+num0.toUpperCase().replace(/[^A-Z0-9]/g,"");
    const u=PRICES.imgs[k];if(u)out.push(u);
  }
  return out.filter(u=>u!==cur);
}
function imgFail(el){
  if(!el._alts){el._alts=altUrls(el.dataset.fs,el.dataset.fn,el.getAttribute("src"));el._ai=0;}
  if(el._ai<el._alts.length){el.src=el._alts[el._ai++];return;}
  el.classList.add("failed");const ph=document.createElement("div");ph.className="noimg";ph.textContent="imagem indisponível";el.parentNode.appendChild(ph);
}
window.imgFail=imgFail;

function updProgress(){const n=ownedCount(),pct=TOTAL?Math.round(n/TOTAL*100):0;ownN.textContent=n;pbar.style.width=pct+"%";ring.style.setProperty("--p",pct);ringpct.textContent=pct+"%";}
function buildChips(){
  const t={},h={};REGIONS.forEach(r=>{t[r]=0;h[r]=0;});
  DATA.forEach(s=>{t[s.region]=(t[s.region]||0)+1;if(isOwned(s))h[s.region]=(h[s.region]||0)+1;});
  chips.innerHTML="";
  const all=document.createElement("button");all.className="chip";all.setAttribute("aria-pressed",filterRegion===null);
  all.innerHTML=`<span class="dot" style="background:var(--gold)"></span>Todas <span class="cnt">${ownedCount()}/${TOTAL}</span>`;
  all.onclick=()=>{filterRegion=null;render();buildChips();};chips.appendChild(all);
  REGIONS.forEach(r=>{if(!t[r])return;const b=document.createElement("button");b.className="chip";b.style.setProperty("--c",`var(--r-${r})`);
    b.setAttribute("aria-pressed",filterRegion===r);
    b.innerHTML=`<span class="dot"></span>${r} <span class="cnt">${h[r]||0}/${t[r]||0}</span>`;
    b.onclick=()=>{filterRegion=filterRegion===r?null:r;render();buildChips();};chips.appendChild(b);});
}
function tile(s){
  const own=isOwned(s),rc=repCard(s),n=combined(s).length,multi=n>1;
  const el=document.createElement("div");el.className="card "+(own?"owned":"miss")+(freshDex.has(s.dexn)?" fresh":"");el.dataset.i=s._i;
  const imgHtml=rc.placeholder?CBACK:(rc.img?`<img loading="lazy" decoding="async" src="${rc.img}" alt="${s.species}" data-fs="${rc.set||''}" data-fn="${rc.num||''}" onerror="imgFail(this)">`:`<div class="noimg">sem imagem</div>`);
  el.innerHTML=`<div class="chk" data-toggle title="${own?'Marcar como faltante':'Marcar como minha'}"><svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg></div>
    ${multi?`<div class="multi">×${n}</div>`:""}
    <div class="rbar" style="--c:var(--r-${s.region})"></div>
    <div class="imgbox">${imgHtml}</div>
    <div class="meta"><div class="dexn">${s.dex} · ${s.region}</div><div class="name">${s.species}</div></div>`;
  el.querySelector("[data-toggle]").addEventListener("click",e=>{e.stopPropagation();quickToggle(s);});
  el.addEventListener("click",()=>openModal(s));return el;
}
function render(){
  const nq=norm(query);
  const list=DATA.filter(s=>{
    if(filterRegion&&s.region!==filterRegion)return false;
    if(filterStatus==="have"&&!isOwned(s))return false;
    if(filterStatus==="need"&&isOwned(s))return false;
    if(nq&&!norm(s.species).includes(nq)&&!s.dex.includes(nq)&&!combined(s).some(c=>norm(c.set||"").includes(nq)||norm(c.name||"").includes(nq)))return false;return true;});
  grid.innerHTML="";
  if(!list.length){grid.innerHTML=`<div class="empty">Nenhum Pokémon com esses filtros.</div>`;return;}
  const f=document.createDocumentFragment();list.forEach(s=>f.appendChild(tile(s)));grid.appendChild(f);
}
function quickToggle(s){if(isOwned(s))delete owned[s.species];else owned[s.species]=0;save();afterChange(s,isOwned(s)?"Marcado: "+s.species:"Removido: "+s.species);}
function setCard(s,idx){if(owned[s.species]===idx){delete owned[s.species];toast("Removido: "+s.species);}else{owned[s.species]=idx;toast("Tenho: "+s.species);}save();afterChange(s);if(ovEl.classList.contains("on"))renderModal(s);}
function afterChange(s,msg){updProgress();buildChips();
  const t=grid.querySelector(`.card[data-i="${s._i}"]`);
  const vis=!((filterStatus==="have"&&!isOwned(s))||(filterStatus==="need"&&isOwned(s)));
  if(t&&vis){t.replaceWith(tile(s));}else render();if(msg)toast(msg);}
const ovEl=document.getElementById("ov");
function openModal(s){renderModal(s);ovEl.classList.add("on");document.body.style.overflow="hidden";}
function closeModal(){ovEl.classList.remove("on");document.body.style.overflow="";}
function renderModal(s){
  const own=isOwned(s),L=combined(s),baseN=s.cards.length;
  const uadded=s.cards.length===1&&s.cards[0].placeholder;
  modal.innerHTML=`
    <div class="mhd"><div class="rowx"><div>
      <div class="dexn">${s.dex} · ${s.region}</div><h2>${s.species}</h2>
      <span class="mtag"><span class="dot" style="width:8px;height:8px;border-radius:50%;background:var(--r-${s.region})"></span>${own?"Você tem esta espécie":"Ainda falta"}</span>
    </div><button class="close" data-close aria-label="Fechar">✕</button></div></div>
    <div class="msub">${uadded?"Adicionado por você — marque quando tiver uma carta de arte rara":`${L.length} carta${L.length>1?"s":""} — clique na que você possui`}</div>
    <div class="cards">${L.map((c,i)=>{const isc=i>=baseN,ph=c.placeholder;return `
      <div class="cc ${own&&owned[s.species]===i?"have":""} ${isc||c.u?"custom":""}">
        ${isc?`<button class="del" data-del="${i-baseN}" title="Remover">✕</button><span class="cbadge">MINHA</span>`:""}
        ${!isc&&c.u?`<button class="del" data-delu="${i}" title="Remover (adicionada da biblioteca)">✕</button><span class="cbadge">MINHA</span>`:""}
        <div class="ib">${ph?CBACK:(c.img?`<img loading="lazy" src="${c.img}" alt="${c.name}" data-fs="${c.set||''}" data-fn="${c.num||''}" onerror="imgFail(this)">`:`<div class="noimg">sem imagem</div>`)}</div>
        <div class="cm"><div class="cset">${ph?"Marcador":c.set}</div><div class="cnum">${ph?"Carta de arte rara":c.name+(c.num?" · nº "+c.num:"")}</div>
        ${c.rarity?`<span class="crar">${c.rarity}</span>`:""}
        <button class="mk" data-card="${i}">${own&&owned[s.species]===i?"✓ Tenho esta":"Marcar como minha"}</button></div>
      </div>`;}).join("")}</div>
    ${uadded?`<div class="rmrow"><button class="rmsp" data-rmsp>Remover este Pokémon da lista</button></div>`:""}
    <div class="addbox">
      <h4>Tem outra carta que não está na lista?</h4>
      <p>Ex.: um promo antigo ou uma versão japonesa. Informe a edição e o nº — e, se quiser, uma imagem: cole a URL (do TCG Codex, por exemplo) ou anexe uma foto do seu computador.</p>
      <div class="addrow">
        <input class="i-set" id="c-set" placeholder="Edição (ex.: XY-P Promo)">
        <input class="i-num" id="c-num" placeholder="Nº (ex.: 268)">
      </div>
      <div class="addrow" style="margin-top:8px">
        <input class="i-set" id="c-img" placeholder="URL da imagem (opcional)">
        <input type="file" id="c-file" accept="image/*" style="display:none">
        <button type="button" class="filebtn" id="c-filebtn">📷 Foto</button>
        <button data-add>Adicionar</button>
      </div>
      <div class="filehint" id="c-filehint"></div>
    </div>`;
  bindCustomImg();
  modal.querySelector("[data-close]").onclick=closeModal;
  modal.querySelectorAll("[data-card]").forEach(b=>b.onclick=()=>setCard(s,+b.dataset.card));
  modal.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>delCustom(s,+b.dataset.del));
  modal.querySelectorAll("[data-delu]").forEach(b=>b.onclick=()=>delLibCard(s,+b.dataset.delu));
  modal.querySelector("[data-add]").onclick=()=>addCustom(s);
  const rm=modal.querySelector("[data-rmsp]");if(rm)rm.onclick=()=>removeUserSpecies(s);
}
async function delLibCard(s,i){
  const card=combined(s)[i];if(!card)return;
  extra=extra.filter(e=>!(e.dexn===s.dexn&&dedup(e.card)===dedup(card)));
  if(owned[s.species]===i)delete owned[s.species];
  else if(owned[s.species]>i)owned[s.species]--;
  await store.set("extra_v1",JSON.stringify(extra));save();
  buildWorking();updProgress();buildChips();render();
  const nsp=DATA.find(x=>x.dexn===s.dexn);
  nsp?renderModal(DATA[nsp._i]):closeModal();
  toast("Carta removida: "+card.name);
}
async function removeUserSpecies(s){
  userSpecies=userSpecies.filter(u=>u.dexn!==s.dexn);
  delete owned[s.species];delete custom[s.species];
  await saveUsp();save();closeModal();
  buildWorking();updProgress();buildChips();render();toast("Removido da lista: "+s.species);
}
let pendingImg=null;
function bindCustomImg(){
  pendingImg=null;
  const fb=document.getElementById("c-filebtn"),fi=document.getElementById("c-file"),fh=document.getElementById("c-filehint");
  if(!fb)return;
  fb.onclick=()=>fi.click();
  fi.onchange=()=>{
    const f=fi.files&&fi.files[0];if(!f)return;
    const rd=new FileReader();
    rd.onload=()=>{
      const im=new Image();
      im.onload=()=>{
        const MAX=480,sc=Math.min(1,MAX/im.height);
        const cv=document.createElement("canvas");
        cv.width=Math.round(im.width*sc);cv.height=Math.round(im.height*sc);
        cv.getContext("2d").drawImage(im,0,0,cv.width,cv.height);
        pendingImg=cv.toDataURL("image/jpeg",0.82);
        fh.textContent="✓ foto anexada ("+f.name+") — clique em Adicionar";
      };
      im.onerror=()=>{fh.textContent="não consegui ler essa imagem";};
      im.src=rd.result;
    };
    rd.readAsDataURL(f);
  };
}
function addCustom(s){
  const set=document.getElementById("c-set").value.trim();const num=document.getElementById("c-num").value.trim();
  const url=(document.getElementById("c-img")||{value:""}).value.trim();
  if(!set){toast("Informe a edição");return;}
  const img=pendingImg||url||null;pendingImg=null;
  (custom[s.species]=custom[s.species]||[]).push({name:s.species,set,num,img,rarity:"minha"});
  owned[s.species]=s.cards.length+custom[s.species].length-1;
  save();updProgress();buildChips();renderModal(s);
  const t=grid.querySelector(`.card[data-i="${s._i}"]`);if(t)t.replaceWith(tile(s));toast("Carta adicionada"+(img?" com imagem":""));
}
function delCustom(s,ci){
  const arr=custom[s.species]||[];const removedIdx=s.cards.length+ci;arr.splice(ci,1);
  if(!arr.length)delete custom[s.species];
  if(owned[s.species]===removedIdx)delete owned[s.species];else if(owned[s.species]>removedIdx)owned[s.species]--;
  save();updProgress();buildChips();renderModal(s);
  const t=grid.querySelector(`.card[data-i="${s._i}"]`);if(t)t.replaceWith(tile(s));toast("Carta removida");
}
ovEl.addEventListener("click",e=>{if(e.target===ovEl)closeModal();});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal();});
let toastT;function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("on");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("on"),2400);}

/* ---------- BOTÃO ATUALIZAR: busca sets novos e incorpora IR/SIR ---------- */
const btnUpd=document.getElementById("btnUpd");
async function updateSets(){
  btnUpd.disabled=true;btnUpd.classList.add("spin");const label=btnUpd.textContent;btnUpd.textContent="Buscando…";
  toast("Procurando novos sets no dataset comunitário…");
  try{
    const sets=await (await fetch(RAW+"sets/en.json",{cache:"no-store"})).json();
    const done=new Set([...KNOWN_SETS,...updatedSets]);
    const news=sets.filter(s=>!done.has(s.id)&&(s.releaseDate||"")>="2023/01/01");
    if(!news.length){toast("Tudo em dia — nenhum set novo encontrado.");return;}
    const before=new Set(DATA.map(s=>s.dexn));
    let addCards=0;freshDex=new Set();
    for(const st of news){
      let cards=null;
      try{cards=await (await fetch(RAW+"cards/en/"+st.id+".json",{cache:"no-store"})).json();}catch(e){}
      if(cards){
        for(const c of cards){
          if(c.supertype!=="Pokémon")continue;
          const KEEPR=["Illustration Rare","Special Illustration Rare"];
          if(!KEEPR.includes(c.rarity))continue;
          const dexs=c.nationalPokedexNumbers||[];if(!dexs.length)continue;
          const card={name:c.name,set:st.name,num:String(c.number),
            img:"https://images.pokemontcg.io/"+st.id+"/"+c.number+".png",rarity:c.rarity};
          let counted=false;
          for(const dexn of dexs){
            const dm=DEXMAP[dexn]||[c.name,"—"];
            const exists=extra.some(e=>e.dexn===dexn&&dedup(e.card)===dedup(card));
            if(!exists){extra.push({dexn,species:dm[0],region:dm[1],dex:"#"+String(dexn).padStart(4,"0"),card});freshDex.add(dexn);counted=true;}
          }
          if(counted)addCards++;
        }
      }
      updatedSets.push(st.id);
    }
    await store.set("extra_v1",JSON.stringify(extra));
    await store.set("usets_v1",JSON.stringify(updatedSets));
    buildWorking();
    const newSp=DATA.filter(s=>!before.has(s.dexn)).length;
    updProgress();buildChips();render();
    const nm=news.map(s=>s.name).slice(0,3).join(", ")+(news.length>3?"…":"");
    toast(`Atualizado: ${news.length} set(s) [${nm}] · +${addCards} cartas · +${newSp} Pokémon`);
  }catch(e){
    toast("Não foi possível conectar ao GitHub. Verifique a internet e tente de novo.");
  }finally{btnUpd.disabled=false;btnUpd.classList.remove("spin");btnUpd.textContent=label;}
}
btnUpd.onclick=updateSets;

/* ---------- BOTÃO + CARTA: biblioteca de cartas quebra-moldura ---------- */
const ovAdd=document.getElementById("ovAdd"),aspq=document.getElementById("aspq"),
      asplist=document.getElementById("asplist"),asphint=document.getElementById("asphint"),
      aspback=document.getElementById("aspback"),aspsub=document.getElementById("aspsub");
let LIB=null,pickDex=null;
async function loadLib(){
  if(LIB)return true;
  try{const r=await fetch("./data/library.json",{cache:"no-store"});if(r.ok){LIB=await r.json();return true;}}catch(_){}
  LIB={};toast("Não consegui carregar a biblioteca (data/library.json).");return false;
}
function speciesRows(){
  const inlist=new Map(DATA.map(s=>[s.dexn,s]));
  const q=norm(aspq.value),out=[];
  for(const k in DEXMAP){
    const dexn=+k,v=DEXMAP[k];
    if(q&&!norm(v[0]).includes(q)&&!String(dexn).includes(q))continue;
    out.push({dexn,species:v[0],region:v[1],listed:inlist.has(dexn),nlib:(LIB[k]||[]).length});
  }
  out.sort((a,b)=>a.dexn-b.dexn);
  return out;
}
function renderSpecies(){
  pickDex=null;aspback.style.display="none";
  aspsub.textContent="Escolha o Pokémon — depois a carta";
  const list=speciesRows().slice(0,80);
  asplist.innerHTML=list.map(m=>`<button class="aspitem" data-dex="${m.dexn}">
      <span>${m.species}</span>
      <span class="dx">#${String(m.dexn).padStart(4,"0")} · ${m.region} · ${m.listed?"na lista":"fora da lista"}${m.nlib?` · ${m.nlib} na biblioteca`:""}</span>
    </button>`).join("") || `<div class="asphint">Nenhum Pokémon com esse nome.</div>`;
  asplist.querySelectorAll("[data-dex]").forEach(b=>b.onclick=()=>renderPicker(+b.dataset.dex));
  asphint.textContent="Biblioteca: Full Arts, Alt Arts, Gold Stars, LEGEND, douradas e outras cartas além da borda (2004→hoje)";
}
function renderPicker(dexn){
  pickDex=dexn;aspback.style.display="";
  const v=DEXMAP[dexn]||["?","—"];
  const sp=DATA.find(s=>s.dexn===dexn);
  const already=new Set(sp?combined(sp).map(dedup):[]);
  const cards=(LIB[String(dexn)]||[]).filter(c=>!already.has(dedup(c)));
  aspsub.textContent=`${v[0]} — escolha a carta para adicionar`;
  let html=cards.map((c,i)=>`<button class="libcard" data-i="${i}">
      <span class="lib-ib">${c.img?`<img loading="lazy" src="${c.img}" alt="${c.name}" data-fs="${c.set||''}" data-fn="${c.num||''}" onerror="imgFail(this)">`:`<div class="noimg">sem imagem</div>`}</span>
      <span class="lib-meta"><b>${c.name}</b><i>${c.set} · nº ${c.num}</i><em>${c.rarity||""}</em></span>
    </button>`).join("");
  if(!sp) html+=`<button class="libcard marker" data-marker>
      <span class="lib-ib">${CBACK}</span>
      <span class="lib-meta"><b>Carta marcadora</b><i>sem set/número</i><em>só para marcar que você tem</em></span>
    </button>`;
  asplist.innerHTML=html||`<div class="asphint">Nada na biblioteca para ${v[0]} — use a carta marcadora pelo painel do Pokémon ou o formulário "adicionar carta" dentro do quadrinho.</div>`;
  asplist.querySelectorAll("[data-i]").forEach(b=>b.onclick=()=>addLibCard(dexn,cards[+b.dataset.i]));
  const mk=asplist.querySelector("[data-marker]");if(mk)mk.onclick=()=>addMarker(dexn);
  asphint.textContent=cards.length?`${cards.length} carta(s) disponível(is) na biblioteca`:"";
}
async function addLibCard(dexn,c){
  const v=DEXMAP[dexn]||[c.name,"—"];
  extra.push({dexn,species:v[0],region:v[1],dex:"#"+String(dexn).padStart(4,"0"),
    card:{name:c.name,set:c.set,num:c.num,img:c.img,rarity:c.rarity,u:1}});
  await store.set("extra_v1",JSON.stringify(extra));
  buildWorking();updProgress();buildChips();render();renderPicker(dexn);
  toast(`Adicionada: ${c.name} (${c.set} nº ${c.num}) — abra ${v[0]} e clique nela para marcar como sua`);
}
async function addMarker(dexn){
  if(!userSpecies.some(u=>u.dexn===dexn)){
    const v=DEXMAP[dexn]||["?","—"];
    userSpecies.push({dexn,species:v[0],region:v[1],dex:"#"+String(dexn).padStart(4,"0")});
    await saveUsp();
  }
  buildWorking();updProgress();buildChips();render();renderPicker(dexn);
  toast(`Quadrinho criado — agora ${TOTAL} Pokémon na lista`);
}
async function openAdd(){
  ovAdd.classList.add("on");document.body.style.overflow="hidden";
  asplist.innerHTML=`<div class="asphint">Carregando biblioteca…</div>`;
  await loadLib();aspq.value="";renderSpecies();setTimeout(()=>aspq.focus(),50);
}
function closeAdd(){ovAdd.classList.remove("on");document.body.style.overflow="";}
document.getElementById("btnAddSp").onclick=openAdd;
document.getElementById("addClose").onclick=closeAdd;
aspback.onclick=renderSpecies;
ovAdd.addEventListener("click",e=>{if(e.target===ovAdd)closeAdd();});
let aqT;aspq.addEventListener("input",()=>{clearTimeout(aqT);aqT=setTimeout(()=>{pickDex==null?renderSpecies():renderSpecies();},120);});
document.addEventListener("keydown",e=>{if(e.key==="Escape"&&ovAdd.classList.contains("on"))closeAdd();});

/* ---------- BOTÃO FALTANTES .txt: lista no formato de consulta por lista ---------- */
function fmtLine(card){
  const num=String(card.num||"");
  if(!/^\d+$/.test(num))return null;               // ignora TG/GG/promos sem número limpo
  const tot=SET_TOTALS[card.set];
  if(!tot)return null;
  return `1 ${card.name} (${num.padStart(3,"0")}/${tot}) [QUALIDADE=NM][IDIOMA=EN]`;
}
function genMissingTxt(){
  const lines=[];let skipped=0;
  DATA.forEach(s=>{
    if(isOwned(s))return;                            // só os que faltam
    let rep=null;
    for(const c of s.cards){rep=fmtLine(c);if(rep)break;}
    if(rep)lines.push(rep);else skipped++;
  });
  if(!lines.length){toast("Nada a exportar — nenhuma carta faltante com número/total conhecido.");return;}
  const blob=new Blob([lines.join("\n")+"\n"],{type:"text/plain;charset=utf-8"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="faltantes-para-precos.txt";a.click();
  toast(`Lista gerada: ${lines.length} carta(s)${skipped?` · ${skipped} sem nº/total omitida(s)`:""}`);
}
document.getElementById("btnTxt").onclick=genMissingTxt;

/* ---------- ESTATÍSTICAS ---------- */
const ovStats=document.getElementById("ovStats");
const priceKey=c=>((c.set||"").toLowerCase().replace(/[^a-z0-9]/g,""))+"|"+String(c.num||"").toUpperCase().replace(/[^A-Z0-9]/g,"");
const priceOf=c=>{if(!PRICES||!PRICES.cards)return null;const v=PRICES.cards[priceKey(c)];return typeof v==="number"?v:null;};
const fmtEur=v=>"€ "+v.toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtMoney=v=>{const r=PRICES&&PRICES.eur_brl;return r?"R$ "+(v*r).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2}):fmtEur(v);};
function renderStats(){
  const total=DATA.length,own=DATA.filter(isOwned).length,miss=total-own;
  const pct=total?Math.round(own/total*1000)/10:0;
  const regs={};DATA.forEach(s=>{(regs[s.region]=regs[s.region]||{t:0,o:0}).t++;if(isOwned(s))regs[s.region].o++;});
  const ORDER=["Kanto","Johto","Hoenn","Sinnoh","Unova","Kalos","Alola","Galar","Paldea","—"];
  let bars="";
  ORDER.forEach(r=>{const d=regs[r];if(!d)return;
    const p=d.t?Math.round(d.o/d.t*100):0;
    bars+=`<div class="rbarrow"><span class="rlab">${r}</span><div class="rtrk"><div class="rfill" style="--c:var(--r-${r});width:${p}%"></div></div><span class="rnum">${d.o}/${d.t} · ${p}%</span></div>`;});
  let price="";
  if(PRICES&&PRICES.cards){
    let vOwn=0,nOwnPriced=0,vMiss=0,nMissPriced=0,noPrice=0;
    DATA.forEach(s=>{
      const L=combined(s);
      if(isOwned(s)){
        const sel=L[owned[s.species]]||L[0];let p=sel?priceOf(sel):null;
        if(p==null){const ps=L.map(priceOf).filter(x=>x!=null);p=ps.length?Math.min(...ps):null;}
        if(p!=null){vOwn+=p;nOwnPriced++;}else noPrice++;
      }else{
        const ps=s.cards.map(priceOf).filter(x=>x!=null);
        if(ps.length){vMiss+=Math.min(...ps);nMissPriced++;}else noPrice++;
      }});
    const rateTxt=PRICES.eur_brl?` · convertido de euros (€ 1 = R$ ${PRICES.eur_brl.toLocaleString("pt-BR")}, BCE ${PRICES.rate_date||""})`:"";
    price=`<div class="sech">Estimativas de preço</div><div class="pricebox">
      <div class="prow"><span>Valor estimado do que você tem (${nOwnPriced} Pokémon)</span><b>${fmtMoney(vOwn)}</b></div>
      <div class="prow"><span>Para completar — carta mais barata por Pokémon (${nMissPriced} faltantes)</span><b>${fmtMoney(vMiss)}</b></div>
      <div class="pnote">Estimativas com dados públicos de mercado (${PRICES.source||"—"}, atualização ${PRICES.updated||"—"})${rateTxt}. Preços variam; ${noPrice?noPrice+" Pokémon sem preço disponível; ":""}use como referência, não como avaliação.</div>
    </div>`;
  }else{
    price=`<div class="sech">Estimativas de preço</div><div class="pricebox"><div class="pnote">Os preços ainda não foram configurados. Quando o robô semanal estiver conectado à fonte de preços, este painel mostrará o valor estimado da sua coleção e quanto falta para completá-la com as cartas mais baratas.</div></div>`;
  }
  document.getElementById("statsbody").innerHTML=`
    <div class="bignums">
      <div class="bignum"><b>${own}</b><span>Tenho</span></div>
      <div class="bignum"><b>${miss}</b><span>Faltam</span></div>
      <div class="bignum"><b>${pct}%</b><span>Completo</span></div>
    </div>
    <div class="sech">Por região</div>${bars}${price}`;
}
function openStats(){renderStats();ovStats.classList.add("on");document.body.style.overflow="hidden";}
function closeStats(){ovStats.classList.remove("on");document.body.style.overflow="";}
document.getElementById("btnStats").onclick=openStats;
document.getElementById("statsClose").onclick=closeStats;
ovStats.addEventListener("click",e=>{if(e.target===ovStats)closeStats();});
document.addEventListener("keydown",e=>{if(e.key==="Escape"&&ovStats.classList.contains("on"))closeStats();});

document.querySelectorAll(".seg button").forEach(b=>b.onclick=()=>{document.querySelectorAll(".seg button").forEach(x=>x.setAttribute("aria-pressed",x===b));filterStatus=b.dataset.st;render();});
let qT;document.getElementById("q").addEventListener("input",e=>{query=e.target.value;clearTimeout(qT);qT=setTimeout(render,120);});
btnExport.onclick=()=>{const blob=new Blob([JSON.stringify({v:4,owned,custom,extra,updatedSets,userSpecies},null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="illustration-rare-dex.json";a.click();toast("Progresso exportado");};
btnImport.onclick=()=>{const inp=document.createElement("input");inp.type="file";inp.accept=".json";inp.onchange=()=>{const f=inp.files[0];if(!f)return;const rd=new FileReader();rd.onload=async()=>{try{const j=JSON.parse(rd.result);owned=j.owned||j||{};custom=j.custom||{};extra=j.extra||[];updatedSets=j.updatedSets||[];userSpecies=j.userSpecies||[];await store.set("extra_v1",JSON.stringify(extra));await store.set("usets_v1",JSON.stringify(updatedSets));await saveUsp();save();buildWorking();updProgress();buildChips();render();toast("Progresso importado");}catch(e){toast("Arquivo inválido");}};rd.readAsText(f);};inp.click();};
btnReset.onclick=()=>{if(confirm("Zerar o progresso marcado? (Os sets atualizados continuam.)")){owned={};custom={};save();updProgress();buildChips();render();toast("Progresso zerado");}};
document.getElementById("foot").innerHTML=`<b><span id="footTot">${TOTAL}</span> Pokémon</b> com carta Alt Art · IR · SIR catalogada. Fonte: dataset comunitário Pokémon TCG (GitHub).<br>Este site se atualiza sozinho toda semana via GitHub Actions. O botão <b>Atualizar agora</b> busca sets novíssimos na hora. Seu progresso fica salvo neste navegador/dispositivo — use <b>Exportar/Importar</b> para levar a outro aparelho.`;

function foldExtras(list){
  if(!Array.isArray(list)||!list.length) return;
  const map=new Map();BASE.forEach(s=>map.set(s.dexn,s));
  list.forEach(e=>{
    const dexn=Number(e.dex!=null?e.dex:e.dexn);if(!dexn)return;
    const info=DEXMAP[dexn]||DEXMAP[String(dexn)]||[e.species||"?","—"];
    let sp=map.get(dexn);
    if(!sp){sp={species:e.species||info[0],dex:"#"+String(dexn).padStart(4,"0"),region:e.region||info[1],dexn:dexn,cards:[]};map.set(dexn,sp);BASE.push(sp);}
    const card={name:e.name||sp.species,set:e.set||"Promo",num:String(e.num||""),img:e.img||"",rarity:e.rarity||"Promo"};
    if(!sp.cards.some(c=>dedup(c)===dedup(card))) sp.cards.push(card);
  });
  BASE.sort((a,b)=>a.dexn-b.dexn);
}
async function loadData(){
  try{
    const [t,d,k]=await Promise.all([
      fetch("./data/tracker.json",{cache:"no-store"}).then(r=>r.json()),
      fetch("./data/dexmap.json",{cache:"no-store"}).then(r=>r.json()),
      fetch("./data/known_sets.json",{cache:"no-store"}).then(r=>r.json())
    ]);
    BASE=t;DEXMAP=d;KNOWN_SETS=k;
    try{const ex=await fetch("./data/extras.json",{cache:"no-store"});if(ex.ok)foldExtras(await ex.json());}catch(_){}
    try{const st=await fetch("./data/set_totals.json",{cache:"no-store"});if(st.ok)SET_TOTALS=await st.json();}catch(_){}
    try{const im=await fetch("./data/imgmap.json",{cache:"no-store"});if(im.ok)IMGMAP=await im.json();}catch(_){}
    try{const lm=await fetch("./data/limmap.json",{cache:"no-store"});if(lm.ok)LIMMAP=await lm.json();}catch(_){}
    try{const pr=await fetch("./data/prices.json",{cache:"no-store"});if(pr.ok)PRICES=await pr.json();}catch(_){}
  }catch(e){
    grid.innerHTML=`<div class="empty">Não consegui carregar os dados (data/tracker.json). Se abriu o arquivo direto do disco, publique no GitHub Pages ou rode um servidor local.</div>`;
    throw e;
  }
}
(async()=>{
  await loadData();
  owned=parse(await store.get("owned_v1"),{});
  custom=parse(await store.get("custom_v1"),{});
  extra=parse(await store.get("extra_v1"),[]);
  updatedSets=parse(await store.get("usets_v1"),[]);
  userSpecies=parse(await store.get("usp_v1"),[]);
  // Higienização: versões antigas do site gravaram no navegador cartas fora do
  // escopo atual (douradas, Full Art ex etc. vindas do Atualizar). Mantém apenas
  // IR/SIR e o que você adicionou de propósito pela biblioteca (u:1).
  {
    const ALLOWED=["Illustration Rare","Special Illustration Rare"];
    const n0=extra.length;
    extra=extra.filter(e=>e&&e.card&&(e.card.u||ALLOWED.includes(e.card.rarity)));
    if(extra.length!==n0){
      await store.set("extra_v1",JSON.stringify(extra));
      console.log(`Memória higienizada: ${n0-extra.length} carta(s) fora do escopo removida(s).`);
    }
  }
  buildWorking();updProgress();buildChips();render();
})();
</script></body></html>
