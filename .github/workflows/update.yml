name: Atualizar cartas

# Roda toda segunda-feira 06:00 UTC (~03:00 no horário de Brasília)
# e também pode ser disparado manualmente na aba "Actions".
on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Incorporar sets novos
        run: python scripts/build.py

      - name: Publicar mudanças (se houver)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --staged --quiet; then
            echo "Nenhuma novidade nesta semana."
          else
            git commit -m "Atualização automática de cartas ($(date -u +%F))"
            git push
          fi
